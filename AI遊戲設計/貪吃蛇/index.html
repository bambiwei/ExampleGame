<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Snake</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05040b;
      --panel: #0c1020;
      --text: #f7fbff;
      --muted: #8fa2bd;
      --pink: #ff3df2;
      --blue: #22d7ff;
      --green: #39ff88;
      --red: #ff315d;
      --line: rgba(34, 215, 255, 0.28);
      --shadow: rgba(0, 0, 0, 0.48);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--text);
      background:
        radial-gradient(circle at 22% 12%, rgba(255, 61, 242, 0.24), transparent 25rem),
        radial-gradient(circle at 80% 18%, rgba(34, 215, 255, 0.20), transparent 24rem),
        radial-gradient(circle at 50% 100%, rgba(57, 255, 136, 0.16), transparent 30rem),
        linear-gradient(145deg, #02030a, var(--bg));
      font-family: "Orbitron", "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      overflow: hidden;
    }

    body::before {
      position: fixed;
      inset: 0;
      pointer-events: none;
      content: "";
      background:
        linear-gradient(rgba(255, 255, 255, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), transparent);
    }

    .phone {
      width: min(92vw, 430px);
      padding: 18px;
      background: linear-gradient(180deg, rgba(16, 24, 46, 0.92), rgba(4, 5, 15, 0.96));
      border: 1px solid var(--line);
      border-radius: 30px;
      box-shadow:
        0 0 34px rgba(34, 215, 255, 0.18),
        0 0 58px rgba(255, 61, 242, 0.12),
        0 28px 80px var(--shadow);
    }

    .phone.shake {
      animation: shake 0.3s linear;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 4px 14px;
    }

    h1 {
      margin: 0;
      color: var(--blue);
      font-size: 1.16rem;
      line-height: 1;
      letter-spacing: 0.12em;
      text-shadow: 0 0 12px rgba(34, 215, 255, 0.9);
      text-transform: uppercase;
    }

    .score {
      min-width: 110px;
      padding: 8px 12px;
      color: #02050a;
      background: linear-gradient(90deg, var(--green), var(--blue));
      border-radius: 999px;
      font-weight: 900;
      text-align: center;
      box-shadow:
        0 0 16px rgba(57, 255, 136, 0.65),
        0 0 30px rgba(34, 215, 255, 0.35);
      transition: transform 0.2s ease, filter 0.2s ease;
    }

    .score.pop {
      transform: scale(1.22);
      filter: brightness(1.45);
    }

    .game-wrap {
      position: relative;
      padding: 10px;
      background: #050712;
      border: 1px solid rgba(255, 61, 242, 0.32);
      border-radius: 24px;
      box-shadow:
        inset 0 0 28px rgba(34, 215, 255, 0.10),
        0 0 32px rgba(255, 61, 242, 0.14);
    }

    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 1;
      background: #070a13;
      border-radius: 18px;
      box-shadow: inset 0 0 36px rgba(0, 0, 0, 0.56);
      transition: opacity 0.6s ease, filter 0.6s ease;
    }

    canvas.fadeout {
      opacity: 0.35;
      filter: blur(1px) saturate(0.55);
    }

    .hint {
      margin: 14px 4px 2px;
      color: var(--muted);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      font-size: 0.92rem;
      text-align: center;
    }

    .controls {
      display: none;
      grid-template-columns: repeat(3, 54px);
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }

    .controls button {
      width: 54px;
      height: 44px;
      color: var(--text);
      background: rgba(12, 16, 32, 0.9);
      border: 1px solid var(--line);
      border-radius: 14px;
      font-size: 1.2rem;
      box-shadow: 0 0 18px rgba(34, 215, 255, 0.12);
    }

    .controls .empty {
      visibility: hidden;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.62);
      backdrop-filter: blur(10px);
    }

    .overlay.show {
      display: grid;
      animation: overlayIn 0.45s ease both;
    }

    .dialog {
      width: min(88vw, 340px);
      padding: 26px;
      background: linear-gradient(180deg, rgba(17, 23, 44, 0.98), rgba(7, 8, 19, 0.98));
      border: 1px solid rgba(255, 61, 242, 0.42);
      border-radius: 24px;
      text-align: center;
      box-shadow:
        0 0 36px rgba(255, 61, 242, 0.24),
        0 0 56px rgba(34, 215, 255, 0.16),
        0 24px 70px var(--shadow);
    }

    .dialog h2 {
      margin: 0 0 10px;
      color: var(--pink);
      font-size: 2rem;
      text-shadow: 0 0 18px rgba(255, 61, 242, 0.95);
      text-transform: uppercase;
    }

    .dialog p {
      margin: 0 0 20px;
      color: var(--muted);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
    }

    .restart {
      width: 100%;
      padding: 13px 18px;
      color: #02050a;
      background: linear-gradient(90deg, var(--pink), var(--blue), var(--green));
      border: 0;
      border-radius: 16px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 0 26px rgba(34, 215, 255, 0.28);
    }

    .restart:active,
    .controls button:active {
      transform: translateY(1px);
    }

    @keyframes shake {
      0%, 100% { transform: translate(0, 0) rotate(0); }
      15% { transform: translate(-8px, 5px) rotate(-1deg); }
      30% { transform: translate(7px, -5px) rotate(1deg); }
      45% { transform: translate(-6px, -4px) rotate(-0.8deg); }
      60% { transform: translate(6px, 5px) rotate(0.8deg); }
      75% { transform: translate(-4px, 3px) rotate(-0.5deg); }
    }

    @keyframes overlayIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (hover: none) and (pointer: coarse) {
      body {
        overflow: auto;
      }

      .controls {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="phone" id="phone" aria-label="貪吃蛇遊戲">
    <div class="topbar">
      <h1>Neon Snake</h1>
      <div class="score" id="score">0 分</div>
    </div>

    <div class="game-wrap">
      <canvas id="board" width="400" height="400" aria-label="遊戲區"></canvas>
    </div>

    <p class="hint">使用鍵盤方向鍵控制蛇移動</p>

    <div class="controls" aria-label="手機方向控制">
      <button class="empty" tabindex="-1"></button>
      <button type="button" data-dir="up" aria-label="向上">▲</button>
      <button class="empty" tabindex="-1"></button>
      <button type="button" data-dir="left" aria-label="向左">◀</button>
      <button type="button" data-dir="down" aria-label="向下">▼</button>
      <button type="button" data-dir="right" aria-label="向右">▶</button>
    </div>
  </main>

  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
    <div class="dialog">
      <h2 id="gameOverTitle">Game Over</h2>
      <p id="finalScore">你的分數：0</p>
      <button class="restart" id="restart" type="button">重新開始</button>
    </div>
  </div>

  <script>
    const canvas = document.querySelector("#board");
    const ctx = canvas.getContext("2d");
    const phone = document.querySelector("#phone");
    const scoreEl = document.querySelector("#score");
    const overlay = document.querySelector("#overlay");
    const finalScoreEl = document.querySelector("#finalScore");
    const restartBtn = document.querySelector("#restart");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;
    const tickMs = 115;
    const colors = ["#39ff88", "#22d7ff", "#ff3df2"];

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let timerId;
    let animationId;
    let gameOver;
    let glowUntil = 0;
    let particles = [];
    let trails = [];
    let audioCtx;

    function startGame() {
      snake = [
        { x: 9, y: 10 },
        { x: 8, y: 10 },
        { x: 7, y: 10 }
      ];
      direction = { x: 1, y: 0 };
      nextDirection = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      particles = [];
      trails = [];
      placeFood();
      updateScore();
      overlay.classList.remove("show");
      phone.classList.remove("shake");
      canvas.classList.remove("fadeout");
      clearInterval(timerId);
      cancelAnimationFrame(animationId);
      timerId = setInterval(tick, tickMs);
      animate();
    }

    function tick() {
      direction = nextDirection;

      const head = snake[0];
      const nextHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      if (hitsWall(nextHead) || hitsSnake(nextHead)) {
        endGame();
        return;
      }

      snake.forEach((part, index) => {
        trails.push({
          x: part.x,
          y: part.y,
          life: 1,
          color: colors[index % colors.length]
        });
      });

      snake.unshift(nextHead);

      if (nextHead.x === food.x && nextHead.y === food.y) {
        score += 10;
        updateScore(true);
        glowUntil = performance.now() + 420;
        burstParticles(food);
        playEatSound();
        placeFood();
      } else {
        snake.pop();
      }
    }

    function animate() {
      draw(performance.now());
      animationId = requestAnimationFrame(animate);
    }

    function draw(now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawBackground(now);
      drawTrails();
      drawSnake(now);
      drawFood(now);
      drawParticles();
    }

    function drawBackground(now) {
      ctx.fillStyle = "#070a13";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const scanlineY = (now / 18) % canvas.height;
      const glow = ctx.createRadialGradient(200, scanlineY, 10, 200, scanlineY, 240);
      glow.addColorStop(0, "rgba(34, 215, 255, 0.08)");
      glow.addColorStop(1, "rgba(34, 215, 255, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "rgba(34, 215, 255, 0.08)";
      ctx.lineWidth = 1;
      for (let i = 0; i <= tileCount; i++) {
        const pos = i * gridSize;
        ctx.beginPath();
        ctx.moveTo(pos, 0);
        ctx.lineTo(pos, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, pos);
        ctx.lineTo(canvas.width, pos);
        ctx.stroke();
      }
    }

    function drawTrails() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      trails = trails
        .map(trail => ({ ...trail, life: trail.life - 0.035 }))
        .filter(trail => trail.life > 0);

      trails.forEach(trail => {
        const alpha = trail.life * 0.35;
        const size = gridSize * (0.45 + trail.life * 0.5);
        const x = trail.x * gridSize + gridSize / 2 - size / 2;
        const y = trail.y * gridSize + gridSize / 2 - size / 2;
        ctx.shadowColor = trail.color;
        ctx.shadowBlur = 24 * trail.life;
        ctx.fillStyle = hexToRgba(trail.color, alpha);
        roundedRect(x, y, size, size, 8);
      });
      ctx.restore();
    }

    function drawSnake(now) {
      const extraGlow = now < glowUntil;
      ctx.save();
      ctx.globalCompositeOperation = "lighter";

      snake.forEach((part, index) => {
        const inset = index === 0 ? 1.5 : 3;
        const x = part.x * gridSize + inset;
        const y = part.y * gridSize + inset;
        const size = gridSize - inset * 2;
        const gradient = ctx.createLinearGradient(x, y, x + size, y + size);
        gradient.addColorStop(0, colors[index % colors.length]);
        gradient.addColorStop(0.52, colors[(index + 1) % colors.length]);
        gradient.addColorStop(1, colors[(index + 2) % colors.length]);

        ctx.shadowColor = extraGlow ? "#ffffff" : colors[index % colors.length];
        ctx.shadowBlur = extraGlow ? 30 : 14;
        ctx.fillStyle = gradient;
        roundedRect(x, y, size, size, index === 0 ? 8 : 6);
      });

      ctx.restore();
    }

    function drawFood(now) {
      const pulse = 1 + Math.sin(now / 180) * 0.18;
      const centerX = food.x * gridSize + gridSize / 2;
      const centerY = food.y * gridSize + gridSize / 2;
      const radius = 7 * pulse;

      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      ctx.shadowColor = "#ff315d";
      ctx.shadowBlur = 18 + Math.sin(now / 180) * 10;
      const gradient = ctx.createRadialGradient(centerX - 3, centerY - 3, 2, centerX, centerY, radius);
      gradient.addColorStop(0, "#fff0f6");
      gradient.addColorStop(0.4, "#ff315d");
      gradient.addColorStop(1, "#ff3df2");
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawParticles() {
      ctx.save();
      ctx.globalCompositeOperation = "lighter";
      particles = particles
        .map(particle => ({
          ...particle,
          x: particle.x + particle.vx,
          y: particle.y + particle.vy,
          vy: particle.vy + 0.02,
          life: particle.life - 0.025,
          rotation: particle.rotation + particle.spin
        }))
        .filter(particle => particle.life > 0);

      particles.forEach(particle => {
        ctx.save();
        ctx.translate(particle.x, particle.y);
        ctx.rotate(particle.rotation);
        ctx.shadowColor = particle.color;
        ctx.shadowBlur = 16 * particle.life;
        ctx.fillStyle = hexToRgba(particle.color, particle.life);
        drawStar(0, 0, particle.size, particle.size * 0.45, 5);
        ctx.restore();
      });
      ctx.restore();
    }

    function burstParticles(position) {
      const centerX = position.x * gridSize + gridSize / 2;
      const centerY = position.y * gridSize + gridSize / 2;

      for (let i = 0; i < 14; i++) {
        const angle = (Math.PI * 2 * i) / 14;
        const speed = 1.2 + Math.random() * 1.9;
        particles.push({
          x: centerX,
          y: centerY,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          size: 3 + Math.random() * 3,
          spin: -0.12 + Math.random() * 0.24,
          rotation: Math.random() * Math.PI,
          color: colors[i % colors.length]
        });
      }
    }

    function drawStar(x, y, outerRadius, innerRadius, points) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const radius = i % 2 === 0 ? outerRadius : innerRadius;
        const angle = (Math.PI / points) * i - Math.PI / 2;
        const px = x + Math.cos(angle) * radius;
        const py = y + Math.sin(angle) * radius;
        if (i === 0) {
          ctx.moveTo(px, py);
        } else {
          ctx.lineTo(px, py);
        }
      }
      ctx.closePath();
      ctx.fill();
    }

    function roundedRect(x, y, width, height, radius) {
      ctx.beginPath();
      ctx.roundRect(x, y, width, height, radius);
      ctx.fill();
    }

    function changeDirection(newDirection) {
      const isReverse =
        newDirection.x + direction.x === 0 &&
        newDirection.y + direction.y === 0;

      if (!isReverse) {
        nextDirection = newDirection;
        playMoveSound();
      }
    }

    function hitsWall(position) {
      return (
        position.x < 0 ||
        position.y < 0 ||
        position.x >= tileCount ||
        position.y >= tileCount
      );
    }

    function hitsSnake(position) {
      return snake.some(part => part.x === position.x && part.y === position.y);
    }

    function placeFood() {
      do {
        food = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(part => part.x === food.x && part.y === food.y));
    }

    function updateScore(pop = false) {
      scoreEl.textContent = `${score} 分`;
      if (pop) {
        scoreEl.classList.remove("pop");
        void scoreEl.offsetWidth;
        scoreEl.classList.add("pop");
        setTimeout(() => scoreEl.classList.remove("pop"), 200);
      }
    }

    function endGame() {
      gameOver = true;
      clearInterval(timerId);
      playGameOverSound();
      phone.classList.remove("shake");
      void phone.offsetWidth;
      phone.classList.add("shake");
      canvas.classList.add("fadeout");
      finalScoreEl.textContent = `你的分數：${score}`;

      setTimeout(() => {
        overlay.classList.add("show");
        restartBtn.focus();
      }, 300);
    }

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }

      if (audioCtx.state === "suspended") {
        audioCtx.resume();
      }
    }

    function playTone({ frequency, duration, type = "sine", volume = 0.08, slideTo }) {
      if (!audioCtx) {
        return;
      }

      const now = audioCtx.currentTime;
      const oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, now);
      if (slideTo) {
        oscillator.frequency.exponentialRampToValueAtTime(slideTo, now + duration);
      }
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(volume, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      oscillator.connect(gain);
      gain.connect(audioCtx.destination);
      oscillator.start(now);
      oscillator.stop(now + duration + 0.02);
    }

    function playMoveSound() {
      playTone({ frequency: 260, duration: 0.045, type: "square", volume: 0.025, slideTo: 360 });
    }

    function playEatSound() {
      playTone({ frequency: 520, duration: 0.08, type: "triangle", volume: 0.09, slideTo: 960 });
      setTimeout(() => playTone({ frequency: 780, duration: 0.08, type: "triangle", volume: 0.07, slideTo: 1180 }), 45);
    }

    function playGameOverSound() {
      playTone({ frequency: 220, duration: 0.28, type: "sawtooth", volume: 0.08, slideTo: 70 });
      setTimeout(() => playTone({ frequency: 110, duration: 0.22, type: "sine", volume: 0.06, slideTo: 55 }), 150);
    }

    function hexToRgba(hex, alpha) {
      const value = hex.replace("#", "");
      const r = parseInt(value.slice(0, 2), 16);
      const g = parseInt(value.slice(2, 4), 16);
      const b = parseInt(value.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    document.addEventListener("keydown", event => {
      const directions = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }
      };

      if (directions[event.key]) {
        event.preventDefault();
        ensureAudio();
        if (!gameOver) {
          changeDirection(directions[event.key]);
        }
      }
    });

    document.querySelectorAll("[data-dir]").forEach(button => {
      button.addEventListener("click", () => {
        ensureAudio();
        const directions = {
          up: { x: 0, y: -1 },
          down: { x: 0, y: 1 },
          left: { x: -1, y: 0 },
          right: { x: 1, y: 0 }
        };
        changeDirection(directions[button.dataset.dir]);
      });
    });

    restartBtn.addEventListener("click", () => {
      ensureAudio();
      startGame();
    });

    startGame();
  </script>
</body>
</html>
